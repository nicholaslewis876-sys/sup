<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSP Assignment Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

  /* ---- NAV TABS ---- */
  .nav { display: flex; align-items: center; gap: 0; background: #161b22; border-bottom: 1px solid #21262d; padding: 0 1.5rem; }
  .nav-logo { height: 36px; filter: brightness(0) invert(1); opacity: 0.85; margin-right: 2rem; padding: 8px 0; }
  .tab { padding: 12px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: #8b949e; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
  .tab.active { color: #e6edf3; border-bottom-color: #1f6feb; font-weight: 500; }
  .tab:hover:not(.active) { color: #c9d1d9; }

  /* ---- PANELS ---- */
  #panel-admin { display: block; padding: 1.5rem; max-width: 860px; margin: 0 auto; }
  #panel-tv    { display: none; padding: 1.5rem; }

  /* ---- ADMIN STYLES ---- */
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .card h2 { font-size: 14px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 1rem; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  input, select { flex: 1; padding: 7px 12px; font-size: 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: #1f6feb; }
  input.short { flex: 0 0 100px; }
  button { padding: 7px 16px; font-size: 13px; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; background: #21262d; color: #e6edf3; transition: background .15s; }
  button:hover { background: #30363d; }
  button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  button.primary:hover { background: #388bfd; }
  button.danger { background: none; border: none; color: #f85149; font-size: 16px; padding: 4px 8px; }
  .job-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid #21262d; }
  .job-row:last-child { border-bottom: none; }
  .job-id { font-family: monospace; font-size: 12px; color: #8b949e; min-width: 80px; }
  .job-name { flex: 1; font-size: 14px; }
  .emp-row { display: flex; gap: 8px; align-items: center; padding: 5px 0; border-bottom: 1px solid #21262d; }
  .emp-row:last-child { border-bottom: none; }
  .emp-name { flex: 1; font-size: 14px; }
  .assign-block { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .assign-emp { font-weight: 600; font-size: 15px; margin-bottom: 8px; color: #e6edf3; }
  .assign-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .assign-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; background: #1d3a2c; color: #5DCAA5; border: 1px solid #0F6E56; }
  .assign-tag button { background: none; border: none; padding: 0; font-size: 14px; line-height: 1; color: #5DCAA5; cursor: pointer; }
  .tag-id { font-family: monospace; opacity: .7; }

  /* ---- TV DISPLAY ---- */
  .tv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #21262d; }
  .tv-logo { height: 44px; filter: brightness(0) invert(1); opacity: 0.88; }
  .tv-meta { text-align: right; }
  .tv-title { font-size: 16px; font-weight: 600; color: #c9d1d9; letter-spacing: 1px; }
  .tv-time { font-size: 13px; color: #6e7681; margin-top: 3px; }
  .tv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .tv-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
  .tv-card-name { font-size: 15px; font-weight: 600; color: #e6edf3; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .tv-card-name svg { opacity: .4; flex-shrink: 0; }
  .tv-badge-wrap { margin-bottom: 6px; }
  .tv-badge-id { font-family: monospace; font-size: 11px; color: #6e7681; margin-bottom: 2px; }
  .tv-badge { display: inline-block; padding: 4px 11px; border-radius: 999px; font-size: 12px; font-weight: 500; }
  .tv-empty { text-align: center; color: #6e7681; padding: 4rem 0; font-size: 15px; }

  /* ---- FULLSCREEN HINT ---- */
  .hint { font-size: 12px; color: #6e7681; background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 1rem; }
  .hint a { color: #1f6feb; }
</style>
</head>

  if (t==='tv') renderTV();
}

// ---- RENDER EMPLOYEES ----
function renderEmployees() {
  const el = document.getElementById('emp-list');
  el.innerHTML = state.employees.length ? state.employees.map((e,i) =>
    '<div class="emp-row"><span class="emp-name">'+e+'</span>'
    +'<button class="danger" onclick="removeEmployee('+i+')" title="Remove">&#128465;</button></div>'
  ).join('') : '<p style="color:#6e7681;font-size:13px;padding:4px 0;">No employees yet.</p>';
  const sel = document.getElementById('pick-emp');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Select employee...</option>'
    + state.employees.map(e => '<option value="'+e+'">'+e+'</option>').join('');
  sel.value = cur;
}

// ---- RENDER JOBS ----
function renderJobs() {
  const el = document.getElementById('job-list');
  el.innerHTML = state.jobs.length ? state.jobs.map((j,i) =>
    '<div class="job-row"><span class="job-id">'+j.id+'</span>'
    +'<span class="job-name">'+j.name+'</span>'
    +'<button class="danger" onclick="removeJob('+i+')" title="Remove">&#128465;</button></div>'
  ).join('') : '<p style="color:#6e7681;font-size:13px;padding:4px 0;">No jobs yet.</p>';
  const sel = document.getElementById('pick-job');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Select job...</option>'
    + state.jobs.map((j,i) => '<option value="'+i+'">['+j.id+'] '+j.name+'</option>').join('');
  sel.value = cur;
}

// ---- RENDER ASSIGNMENTS ----
function renderAssignments() {
  const el = document.getElementById('assign-list');
  if (!state.assignments.length) {
    el.innerHTML = '<p style="color:#6e7681;font-size:13px;padding:4px 0;">No assignments yet.</p>';
    return;
  }
  const byEmp = {};
  state.assignments.forEach((a,i) => { if (!byEmp[a.emp]) byEmp[a.emp]=[]; byEmp[a.emp].push({...a, idx:i}); });
  el.innerHTML = Object.entries(byEmp).map(([emp,jobs]) =>
    '<div class="assign-block">'
    +'<div class="assign-emp">'+emp+'</div>'
    +'<div class="assign-tags">'
    + jobs.map(({jobIdx, idx}) => {
        const j = state.jobs[jobIdx]; if (!j) return '';
        return '<span class="assign-tag">'
          +'<span class="tag-id">'+j.id+'</span> '+j.name
          +' <button onclick="removeAssignment('+idx+')" title="Remove">&#x2715;</button>'
          +'</span>';
      }).join('')
    +'</div></div>'
  ).join('');
}

// ---- RENDER TV ----
function renderTV() {
  const grid = document.getElementById('tv-grid');
  const empty = document.getElementById('tv-empty');
  const byEmp = {};
  state.assignments.forEach(a => { if (!byEmp[a.emp]) byEmp[a.emp]=[]; byEmp[a.emp].push(a.jobIdx); });
  if (!Object.keys(byEmp).length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = Object.entries(byEmp).map(([emp, idxs]) =>
    '<div class="tv-card">'
    +'<div class="tv-card-name">'
    +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'
    + emp +'</div>'
    + idxs.map((ji,ci) => {
        const j = state.jobs[ji]; if (!j) return '';
        const c = COLORS[ci % COLORS.length];
        return '<div class="tv-badge-wrap">'
          +'<div class="tv-badge-id">'+j.id+'</div>'
          +'<div class="tv-badge" style="background:'+c.bg+';color:'+c.text+';border:1px solid '+c.border+'">'+j.name+'</div>'
          +'</div>';
      }).join('')
    +'</div>'
  ).join('');
}

// ---- CLOCK ----
function updateTime() {
  const el = document.getElementById('tv-time');
  if (el) el.textContent = new Date().toLocaleString('en-US',{weekday:'long',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
updateTime();
setInterval(updateTime, 30000);

// ---- AUTO-REFRESH (TV) ----
setInterval(() => {
  if (document.getElementById('panel-tv').style.display !== 'none') renderTV();
}, 60000);

// ---- ACTIONS ----
function addEmployee() {
  const inp = document.getElementById('new-emp');
  const v = inp.value.trim();
  if (!v || state.employees.includes(v)) return;
  state.employees.push(v); inp.value='';
  save(); renderEmployees(); renderAssignments();
}
function removeEmployee(i) {
  const name = state.employees[i];
  state.employees.splice(i, 1);
  state.assignments = state.assignments.filter(a => a.emp !== name);
  save(); renderEmployees(); renderAssignments();
}
function addJob() {
  const idEl = document.getElementById('new-job-id');
  const nmEl = document.getElementById('new-job-name');
  const id = idEl.value.trim().toUpperCase();
  const name = nmEl.value.trim();
  if (!id || !name) return;
  state.jobs.push({id, name}); idEl.value=''; nmEl.value='';
  save(); renderJobs(); renderAssignments();
}
function removeJob(i) {
  state.jobs.splice(i, 1);
  state.assignments = state.assignments.filter(a => a.jobIdx !== i)
    .map(a => ({...a, jobIdx: a.jobIdx > i ? a.jobIdx-1 : a.jobIdx}));
  save(); renderJobs(); renderAssignments();
}
function addAssignment() {
  const emp = document.getElementById('pick-emp').value;
  const jobIdxStr = document.getElementById('pick-job').value;
  if (!emp || jobIdxStr==='') return;
  const jobIdx = parseInt(jobIdxStr);
  if (state.assignments.find(a => a.emp===emp && a.jobIdx===jobIdx)) return;
  state.assignments.push({emp, jobIdx});
  save(); renderAssignments();
}
function removeAssignment(i) {
  state.assignments.splice(i, 1);
  save(); renderAssignments();
}

// ---- KEYBOARD SHORTCUTS ----
document.getElementById('new-emp').addEventListener('keydown', e => e.key==='Enter' && addEmployee());
document.getElementById('new-job-id').addEventListener('keydown', e => e.key==='Enter' && document.getElementById('new-job-name').focus());
document.getElementById('new-job-name').addEventListener('keydown', e => e.key==='Enter' && addJob());

// ---- INIT ----
renderEmployees(); renderJobs(); renderAssignments();
</script>
</body>
</html>
